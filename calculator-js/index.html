<!DOCTYPE html>
<html lang="en">
	<head>
    	<meta charset="utf-8">
    	<meta name="description" content="This is where your description goes">
    	<meta name="keywords" content="one, two, three">

		<title>Title in the tab</title>

		<!-- external CSS link -->
		<link rel="stylesheet" href="css/normalize.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>

		<div class="mainBox">
			<div class="display">
				<h2></h2>
			</div>
			<div class="numbers">
				<button>1</button>
				<button>2</button>
				<button>3</button>
				<button>4</button>
				<button>5</button>
				<button>6</button>
				<button>7</button>
				<button>8</button>
				<button>9</button>
				<button id="zero">0</button>
			</div>
			<div class="operators">
				<button id="clear">clear</button>
				<button>+</button>
				<button>-</button>
				<button>/</button>
				<button>*</button>
				<button id="equal">=</button>
			</div>

		</div>

		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
